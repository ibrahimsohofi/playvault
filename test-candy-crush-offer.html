<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Candy Crush AdBlueMedia Offer</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #f0f0f0; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; }
        button { background: #007bff; color: white; border: none; padding: 12px 24px; border-radius: 4px; cursor: pointer; font-size: 16px; margin: 10px 0; }
        button:hover { background: #0056b3; }
        .log { background: #f8f9fa; border: 1px solid #dee2e6; padding: 10px; margin: 10px 0; border-radius: 4px; font-family: monospace; white-space: pre-wrap; }
        .status { padding: 10px; margin: 10px 0; border-radius: 4px; }
        .success { background: #d4edda; border: 1px solid #c3e6cb; color: #155724; }
        .error { background: #f8d7da; border: 1px solid #f5c6cb; color: #721c24; }
        .info { background: #d1ecf1; border: 1px solid #bee5eb; color: #0c5460; }
    </style>
</head>
<body>
    <div class="container">
        <h1>AdBlueMedia Candy Crush Test</h1>
        <p>This page tests the AdBlueMedia configuration for Candy Crush to debug the offer loading issue.</p>

        <div id="status" class="status info">Initializing...</div>

        <button onclick="testOffer()">Test Open Offer</button>
        <button onclick="checkWindow()">Check Window Functions</button>
        <button onclick="clearLog()">Clear Log</button>

        <div id="log" class="log">Ready to test...</div>
    </div>

    <script>
        // Configuration from the PlayVault app
        var RnBWE_GjX_DURZcc = {"it": 4503226, "key": "af8d5"};

        let logElement = document.getElementById('log');
        let statusElement = document.getElementById('status');

        function log(message) {
            console.log(message);
            logElement.textContent += new Date().toLocaleTimeString() + ': ' + message + '\n';
            logElement.scrollTop = logElement.scrollHeight;
        }

        function updateStatus(message, type = 'info') {
            statusElement.textContent = message;
            statusElement.className = 'status ' + type;
        }

        function clearLog() {
            logElement.textContent = 'Log cleared...\n';
        }

        function checkWindow() {
            log('Checking window functions...');
            const funcs = Object.keys(window).filter(key => key.startsWith('_'));
            log('Available functions starting with _: ' + funcs.join(', '));

            // Check specifically for _iH
            if (typeof window._iH === 'function') {
                log('✅ _iH function is available and ready');
                updateStatus('Function _iH is available', 'success');
            } else {
                log('❌ _iH function not found. Type: ' + typeof window._iH);
                updateStatus('Function _iH not available', 'error');
            }
        }

        function testOffer() {
            log('Testing AdBlueMedia offer...');
            updateStatus('Testing offer...', 'info');

            if (typeof window._iH === 'function') {
                try {
                    log('Calling _iH() function...');
                    window._iH();
                    log('✅ _iH() called successfully - check for popup/new window');
                    updateStatus('Offer function called successfully', 'success');
                } catch (error) {
                    log('❌ Error calling _iH(): ' + error.message);
                    updateStatus('Error calling offer function', 'error');
                }
            } else {
                log('❌ Function _iH not available. Loading script...');
                loadScript();
            }
        }

        function loadScript() {
            log('Loading AdBlueMedia script...');
            updateStatus('Loading script...', 'info');

            const script = document.createElement('script');
            script.src = 'https://dfmpe7igjx4jo.cloudfront.net/40bb691.js';

            script.onload = function() {
                log('✅ Script loaded successfully');
                setTimeout(() => {
                    checkWindow();
                }, 500);
            };

            script.onerror = function() {
                log('❌ Failed to load script');
                updateStatus('Failed to load script', 'error');
            };

            document.head.appendChild(script);
        }

        // Auto-load the script when page loads
        window.addEventListener('load', function() {
            log('Page loaded, initializing...');
            log('Configuration: ' + JSON.stringify(RnBWE_GjX_DURZcc));
            loadScript();
        });
    </script>
</body>
</html>
